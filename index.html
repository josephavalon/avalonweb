    <!-- Fonts — self-hosted to remove third-party render dependency -->
    <link rel="preload" href="/fonts/inter-400.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="preload" href="/fonts/bebas-neue-400.ttf" as="font" type="font/ttf" crossorigin />
    <link rel="stylesheet" href="/fonts/avalon-fonts.css" />

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "telephone": "+14159807708",
      "email": "support@avalonvitality.co",
      "priceRange": "$$$",
      "image": "https://www.avalonvitality.co/og-homepage.jpg?v=20260527",
      "areaServed": [
        { "@type": "AdministrativeArea", "name": "San Francisco Bay Area" },
        { "@type": "City", "name": "San Francisco" },
        { "@type": "City", "name": "Oakland" },
        { "@type": "City", "name": "San Jose" },
        { "@type": "City", "name": "Palo Alto" },

      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "San Francisco",
        "addressRegion": "CA",
        "addressCountry": "US"
      },
      "openingHoursSpecification": [{
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
        "opens": "08:00",
        "closes": "20:00"
      }],
      "sameAs": []
    }

    <!-- PWA iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Avalon" />
    <!-- theme-color for light vs dark OS preference -->
    <meta name="theme-color" content="#0A0A0A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F5F5F3" media="(prefers-color-scheme: light)" />

    <script src="/theme-bootstrap.js?v=20260528"></script>
    <!-- Anti-FOUC background lock. The CSS bundle loads asynchronously via the JS
         module, so there is a paint window where background-color is unset → white flash.
         These rules apply the correct background immediately from the theme class that
         the script above already wrote to <html>, before a single pixel paints. -->
    <style>
      html, body { background-color: hsl(0,0%,96%); }
      html.dark, html.dark body { background-color: #0a0a0a; }
      html.golden, html.golden body { background-color: hsl(28,35%,12%); }
      html.dubs, html.dubs body { background-color: hsl(218,60%,16%); }
      #root { min-height: 100dvh; background: inherit; }
      #root:empty { min-height: 100dvh; background: #0a0a0a; }
      html.av-js #seo-prerender {
        display: none !important;
        visibility: hidden !important;
      }
      .av-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #f4f4f1;
        opacity: 1;
        transition: opacity 160ms cubic-bezier(0.16, 1, 0.3, 1), visibility 160ms cubic-bezier(0.16, 1, 0.3, 1);
        visibility: visible;
        pointer-events: none;
      }
      .av-boot-splash[data-state="leaving"] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      html.av-skip-boot .av-boot-splash {
        display: none;
        visibility: hidden;
        pointer-events: none;
      }
      .av-boot-lockup {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: avBootPulse 900ms cubic-bezier(0.16, 1, 0.3, 1) 1;
        transform-origin: 50% 50%;
      }
      .av-boot-mark {
        margin: 0;
        padding-left: 0.32em;
        font-family: "Bebas Neue", Impact, sans-serif;
        font-size: clamp(5.25rem, 17vw, 11rem);
        line-height: 0.82;
        letter-spacing: 0.32em;
        user-select: none;
      }
      .av-boot-wordmark {
        margin: 0.75rem 0 0;
        font-family: "Inter", Arial, sans-serif;
        font-size: 10px;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(244, 244, 241, 0.46);
        user-select: none;
      }
      .av-boot-progress {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 2px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .av-boot-progress span {
        display: block;
        height: 100%;
        background: #f4f4f1;
        transform-origin: 0 50%;
        animation: avBootProgress 420ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes avBootPulse {
        0%, 100% { opacity: 0.78; transform: scale(0.985); filter: blur(0); }
        50% { opacity: 1; transform: scale(1.015); filter: blur(0); }
      }
      @keyframes avBootProgress {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .av-boot-lockup,
        .av-boot-progress span {
          animation: none;
        }
      }

      /* Suppress Google Translate toolbar — we use our own picker UI */
      .goog-te-banner-frame, .goog-te-banner-frame.skiptranslate { display: none !important; }
      .goog-te-gadget, .goog-te-gadget-simple { display: none !important; }
      .goog-te-menu-value { display: none !important; }
      body > .skiptranslate { display: none !important; }
      body { top: 0 !important; }
      /* Prevent Google's font injection from overriding ours */
      font { display: inline !important; }
    </style>
  </head>
  <body>
    <div id="av-boot-splash" class="av-boot-splash" role="status" aria-live="polite" aria-label="Loading Avalon Vitality">
      <div class="av-boot-lockup">
        <p class="av-boot-mark">AV</p>
        <p class="av-boot-wordmark">AVALON VITALITY</p>
      </div>
      <div class="av-boot-progress" aria-hidden="true"><span></span></div>
    </div>
    <script src="/boot-splash.js" defer></script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Translate target. The script is loaded lazily by LanguageSelect only when needed. -->
    <div id="google_translate_element" style="display:none;visibility:hidden;position:absolute;"></div>
  </body>
</html>
