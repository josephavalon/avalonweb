<!doctype html>

    <meta charset="UTF-8" />
    <script>
      // Hard scroll-to-top on every load — beats iOS Safari's auto-restore.
      // Strategy: disable browser restore, then force scroll on every lifecycle hook.
      (function () {
        try { if ('scrollRestoration' in history) history.scrollRestoration = 'manual'; } catch (e) {}
        function stripHashAndTop() {
          try {
            if (location.hash) history.replaceState(null, '', location.pathname + location.search);
          } catch (e) {}
          window.scrollTo(0, 0);
          if (document.documentElement) document.documentElement.scrollTop = 0;
          if (document.body) document.body.scrollTop = 0;
        }
        // 1) immediately
        stripHashAndTop();
        // 2) after DOM parsed
        document.addEventListener('DOMContentLoaded', stripHashAndTop);
        // 3) after pageshow (covers bfcache too)
        window.addEventListener('pageshow', stripHashAndTop);
        // 4) after full load
        window.addEventListener('load', stripHashAndTop);
        // 5) two rAF ticks after first paint, to outrun Safari's restore
        requestAnimationFrame(function () {
          requestAnimationFrame(stripHashAndTop);
        });
      })();
    </script>

    <!-- Pre-hydration theme bootstrap. Reads stored theme before React mounts
         so the first paint already matches user preference. Prevents FOUC. -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('avalon.theme');
          var theme = (stored === 'light' || stored === 'dark' || stored === 'golden') ? stored : 'dark';
          var cl = document.documentElement.classList;
          cl.remove('dark', 'golden');
          if (theme !== 'light') cl.add(theme);
        } catch (e) { /* no-op */ }
      })();
    </script>
