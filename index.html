    <!-- Theme + boot bootstrap: INLINE and BLOCKING on purpose. It must set
         `av-js` (hides the #seo-prerender snapshot) and `av-skip-boot` (hides the
         boot splash on repeat views) BEFORE the first paint. Deferring it left a
         paint window where the stale prerender / old splash flashed on refresh. -->
    <script>
      (function () {
        window.__AV_BOOT_STARTED_AT = Date.now();
        document.documentElement.classList.add('av-js');
        var VALID = ['dark', 'daytime', 'golden-hour', 'warriors', 'pride', 'july', 'light', 'golden', 'dubs'];
        try {
          var stored = window.localStorage.getItem('avalon.theme');
          var theme = (stored && VALID.indexOf(stored) !== -1) ? stored : 'dark';
          if (theme === 'light') theme = 'daytime';
          if (theme === 'golden') theme = 'golden-hour';
          if (theme === 'dubs') theme = 'warriors';
          var cl = document.documentElement.classList;
          cl.remove('dark', 'daytime', 'golden-hour', 'warriors', 'pride', 'july', 'light', 'golden', 'dubs');
          cl.add(theme);
          var nameFlag = '__AV_BOOT_SPLASH_SEEN__';
          var seenInSession = window.sessionStorage.getItem('av.bootSplashSeen') === '1';
          var skipOnce = window.sessionStorage.getItem('av.skipSplashOnce') === '1';
          var seenInTab = String(window.name || '').indexOf(nameFlag) !== -1;
          if (seenInSession || skipOnce || seenInTab) {
            window.sessionStorage.removeItem('av.skipSplashOnce');
            cl.add('av-skip-boot');
            window.__AV_BOOT_SKIP_SPLASH = true;
          } else {
            window.sessionStorage.setItem('av.bootSplashSeen', '1');
            window.name = window.name ? window.name + ' ' + nameFlag : nameFlag;
          }
        } catch (e) {
          window.__AV_THEME_BOOTSTRAP_ERROR = true;
        }
      })();
    </script>
    <!-- Anti-FOUC background lock. The CSS bundle loads asynchronously via the JS
         module, so there is a paint window where background-color is unset → white flash.
         These rules apply the correct background immediately from the theme class that
         the script above already wrote to <html>, before a single pixel paints. -->
    <style>
      html, body { background-color: hsl(0,0%,96%); }
      html.dark, html.dark body { background-color: #2a2521; }
      html.golden, html.golden body { background-color: hsl(28,35%,16%); }
      html.dubs, html.dubs body { background-color: hsl(218,60%,16%); }
      #root { min-height: 100dvh; background: transparent; }
      #root:empty { min-height: 100dvh; background: transparent; }
      html.av-js #seo-prerender {
        display: none !important;
        visibility: hidden !important;
      }
      .av-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #2a2521;
        background-image:
          linear-gradient(90deg, rgba(42, 37, 33, 0.84), rgba(42, 37, 33, 0.52) 45%, rgba(42, 37, 33, 0.22)),
          image-set(
            url("/images/avalon-static-back-512.webp") type("image/webp"),
            url("/images/avalon-static-back-512.jpg") type("image/jpeg")
          );
        background-size: cover;
        background-position: 86% 52%;
        color: #f4f4f1;
        opacity: 1;
        transition: opacity 160ms cubic-bezier(0.16, 1, 0.3, 1), visibility 160ms cubic-bezier(0.16, 1, 0.3, 1);
        visibility: visible;
        pointer-events: none;
      }
      .av-boot-splash[data-state="leaving"] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      html.av-skip-boot .av-boot-splash {
        display: none;
        visibility: hidden;
        pointer-events: none;
      }
      .av-boot-lockup {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: avBootPulse 900ms cubic-bezier(0.16, 1, 0.3, 1) 1;
        transform-origin: 50% 50%;
      }
      .av-boot-logo {
        display: block;
        height: clamp(6.5rem, 21vw, 12.5rem);
        width: auto;
        color: #f4f4f1;
        user-select: none;
      }
      .av-boot-wordmark {
        margin: 1.1rem 0 0;
        font-family: "Inter", Arial, sans-serif;
        font-size: 10px;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(244, 244, 241, 0.46);
        user-select: none;
      }
      .av-boot-progress {
        position: absolute;
        z-index: 1;
        left: 0;
        right: 0;
        bottom: 0;
        height: 2px;
        background: rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .av-boot-progress span {
        display: block;
        height: 100%;
        background: #f4f4f1;
        transform-origin: 0 50%;
        animation: avBootProgress 420ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes avBootPulse {
        0%, 100% { opacity: 0.78; transform: scale(0.985); filter: blur(0); }
        50% { opacity: 1; transform: scale(1.015); filter: blur(0); }
      }
      @keyframes avBootProgress {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .av-boot-lockup,
        .av-boot-progress span {
          animation: none;
        }
      }

      /* Suppress Google Translate toolbar — we use our own picker UI */

      body > .skiptranslate { display: none !important; }
      body { top: 0 !important; }
      /* Prevent Google's font injection from overriding ours */
      font { display: inline !important; }
    </style>
